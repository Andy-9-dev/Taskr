<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskr — To-Do List</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#90EE90;--surf:#a8f5a8;--bord:#7dd97d;--acc:#7c5cfc;--acc2:#fc5c7d;--txt:#1a1a1a;--mute:#666666;--done:#c8e6c9}
html{font-size:16px}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:clamp(1.5rem,4vw,3rem);
  background-image:radial-gradient(ellipse at 15% 15%,rgba(124,92,252,.18) 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 85%,rgba(252,92,125,.12) 0%,transparent 55%)}
.app{max-width:600px;margin:0 auto}
/* HEADER */
.hdr{margin-bottom:2.5rem;animation:fadeUp .5s both}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
h1{font-size:clamp(2.2rem,8vw,3.2rem);font-weight:800;letter-spacing:-.04em;line-height:1}
h1 span{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.date{font-family:'Syne Mono',monospace;font-size:.72rem;color:var(--mute);margin-top:.5rem}
.badge{font-family:'Syne Mono',monospace;font-size:.75rem;color:var(--mute);background:var(--surf);border:1px solid var(--bord);padding:.4rem .9rem;border-radius:100px;white-space:nowrap;align-self:flex-start;margin-top:.2rem}
/* PROGRESS */
.prog-wrap{background:var(--surf);border:1px solid var(--bord);border-radius:100px;height:4px;margin-bottom:1.5rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* INPUT */
.inp-area{display:flex;gap:.7rem;margin-bottom:1.4rem;animation:fadeUp .5s .1s both}
.inp-wrap{flex:1;min-width:0}
input[type=text]{width:100%;background:var(--surf);border:1px solid var(--bord);color:var(--txt);font-family:'Syne',sans-serif;font-size:.9rem;padding:.95rem 1.1rem;border-radius:14px;outline:none;transition:border-color .2s,box-shadow .2s}
input[type=text]:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
input[type=text]::placeholder{color:var(--mute)}
.add-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;padding:0 1.2rem;border-radius:14px;cursor:pointer;transition:opacity .2s,transform .1s;min-width:52px;flex-shrink:0}
.add-btn:hover{opacity:.85}
.add-btn:active{transform:scale(.93)}
/* FILTERS */
.filters{display:flex;gap:.45rem;margin-bottom:1.4rem;flex-wrap:wrap;animation:fadeUp .5s .15s both}
.f-btn{background:var(--surf);border:1px solid var(--bord);color:var(--mute);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.45rem .95rem;border-radius:100px;cursor:pointer;transition:all .2s;white-space:nowrap}
.f-btn.on{background:var(--acc);border-color:var(--acc);color:#fff}
/* SORT / EXTRA CONTROLS */
.ctrl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.ctrl-left{display:flex;gap:.4rem;flex-wrap:wrap}
.ctrl-btn{background:none;border:1px solid var(--bord);color:var(--mute);font-family:'Syne',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .8rem;border-radius:100px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{color:var(--txt);border-color:var(--mute)}
.task-count{font-family:'Syne Mono',monospace;font-size:.68rem;color:var(--mute)}
/* TASK LIST */
.task-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.task-item{background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:.95rem 1.1rem;display:flex;align-items:center;gap:.9rem;transition:all .25s;animation:taskIn .3s ease both;position:relative;overflow:hidden}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .3s}
.task-item:hover{border-color:rgba(124,92,252,.4);transform:translateX(2px)}
.task-item:hover::before{background:var(--acc)}
.task-item.done{background:var(--done);opacity:.55}
.task-item.done .task-txt{text-decoration:line-through;color:var(--mute)}
.task-item.done::before{background:rgba(124,92,252,.3)}
@keyframes taskIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes taskOut{to{opacity:0;transform:translateX(30px);max-height:0;margin:0;padding:0}}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--mute);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.7rem;color:#fff}
.chk.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent}
.chk:hover:not(.on){border-color:var(--acc)}
.task-txt{flex:1;font-size:.88rem;font-weight:400;min-width:0;word-break:break-word}
.task-pri{font-family:'Syne Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.18rem .55rem;border-radius:100px;flex-shrink:0}
.pri-h{background:rgba(252,92,125,.15);color:var(--acc2)}
.pri-m{background:rgba(252,200,80,.15);color:#fcc850}
.pri-l{background:rgba(80,252,160,.15);color:#50fca0}
.del-btn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:1rem;padding:.2rem;opacity:0;transition:opacity .2s,color .2s;line-height:1;flex-shrink:0}
.task-item:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--acc2)}
/* EMPTY */
.empty{text-align:center;padding:3.5rem 1.5rem;color:var(--mute);font-size:.85rem}
.empty-icon{font-size:2.8rem;margin-bottom:.8rem;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
/* FOOTER */
.app-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;flex-wrap:wrap;gap:.5rem}
.clr-btn{background:none;border:none;color:var(--mute);font-family:'Syne',sans-serif;font-size:.72rem;cursor:pointer;transition:color .2s;padding:0}
.clr-btn:hover{color:var(--acc2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div><h1>Task<span>r</span></h1><div class="date" id="dateEl"></div></div>
      <span class="badge" id="badge">0 remaining</span>
    </div>
  </div>

  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <div class="inp-area">
    <div class="inp-wrap"><input type="text" id="inp" placeholder="Add a new task…" maxlength="100"/></div>
    <button class="add-btn" id="addBtn" title="Add task">+</button>
  </div>

  <div class="filters" id="filterBtns">
    <button class="f-btn on" data-f="all">All</button>
    <button class="f-btn" data-f="active">Active</button>
    <button class="f-btn" data-f="done">Done</button>
    <button class="f-btn" data-f="high">🔴 High</button>
    <button class="f-btn" data-f="med">🟡 Medium</button>
    <button class="f-btn" data-f="low">🟢 Low</button>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-left" id="sortBtns">
      <button class="ctrl-btn" data-sort="date">By Date</button>
      <button class="ctrl-btn" data-sort="alpha">A–Z</button>
      <button class="ctrl-btn" data-sort="pri">By Priority</button>
    </div>
    <span class="task-count" id="taskCount"></span>
  </div>

  <ul class="task-list" id="list"></ul>

  <div class="app-footer">
    <button class="clr-btn" id="clearDoneBtn">Clear completed</button>
    <button class="clr-btn" id="clearAllBtn">Clear all</button>
  </div>
</div>

<script>
const PRIS=['high','med','low'];
let tasks=[
  {id:1,text:'Design homepage wireframes',done:false,pri:'high',ts:Date.now()-3e6},
  {id:2,text:'Review pull requests from the team',done:true,pri:'med',ts:Date.now()-2e6},
  {id:3,text:'Write unit tests for API module',done:false,pri:'high',ts:Date.now()-1e6},
  {id:4,text:'Update project documentation',done:false,pri:'low',ts:Date.now()},
];
let filt='all',sortBy='date';
document.getElementById('dateEl').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function add(){
  const v=document.getElementById('inp').value.trim();
  if(!v)return;
  tasks.unshift({id:Date.now(),text:v,done:false,pri:PRIS[Math.floor(Math.random()*3)],ts:Date.now()});
  document.getElementById('inp').value='';
  render();
}
function toggle(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;render();}}
function del(id){tasks=tasks.filter(x=>x.id!==id);render();}
function changePri(id){const t=tasks.find(x=>x.id===id);if(t){t.pri=PRIS[(PRIS.indexOf(t.pri)+1)%3];render();}}
function setFilter(f){filt=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));document.querySelector(`[data-f="${f}"]`).classList.add('on');render();}
function setSort(s){sortBy=s;render();}
function clearDone(){tasks=tasks.filter(t=>!t.done);render();}
function clearAll(){if(confirm('Clear all tasks?')){tasks=[];render();}}
function getFiltered(){
  let t=[...tasks];
  if(filt==='active')t=t.filter(x=>!x.done);
  else if(filt==='done')t=t.filter(x=>x.done);
  else if(filt==='high')t=t.filter(x=>x.pri==='high');
  else if(filt==='med')t=t.filter(x=>x.pri==='med');
  else if(filt==='low')t=t.filter(x=>x.pri==='low');
  if(sortBy==='alpha')t.sort((a,b)=>a.text.localeCompare(b.text));
  else if(sortBy==='pri')t.sort((a,b)=>PRIS.indexOf(a.pri)-PRIS.indexOf(b.pri));
  else t.sort((a,b)=>b.ts-a.ts);
  return t;
}
function render(){
  const all=tasks;const done=all.filter(x=>x.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('badge').textContent=`${all.filter(x=>!x.done).length} remaining`;
  const filtered=getFiltered();
  document.getElementById('taskCount').textContent=`${filtered.length} task${filtered.length!==1?'s':''}`;
  const list=document.getElementById('list');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><span class="empty-icon">✦</span>${filt==='done'?'No completed tasks yet.':filt==='active'?'All done! 🎉':'No tasks. Add one above!'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(t=>`
    <li class="task-item${t.done?' done':''}" data-id="${t.id}">
      <button class="chk${t.done?' on':''}" data-toggle="${t.id}">${t.done?'✓':''}</button>
      <span class="task-txt">${escHtml(t.text)}</span>
      <button class="task-pri pri-${t.pri}" data-pri="${t.id}" title="Change priority">${t.pri}</button>
      <button class="del-btn" data-del="${t.id}" title="Delete">✕</button>
    </li>`).join('');
  attachTaskListeners();
}
function attachTaskListeners(){
  document.querySelectorAll('[data-toggle]').forEach(btn=>btn.addEventListener('click',e=>toggle(parseInt(e.target.dataset.toggle))));
  document.querySelectorAll('[data-pri]').forEach(btn=>btn.addEventListener('click',e=>changePri(parseInt(e.target.dataset.pri))));
  document.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',e=>del(parseInt(e.target.dataset.del))));
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.getElementById('addBtn').addEventListener('click',add);
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')add();});
document.getElementById('filterBtns').addEventListener('click',e=>{if(e.target.classList.contains('f-btn'))setFilter(e.target.dataset.f);});
document.getElementById('sortBtns').addEventListener('click',e=>{if(e.target.classList.contains('ctrl-btn'))setSort(e.target.dataset.sort);});
document.getElementById('clearDoneBtn').addEventListener('click',clearDone);
document.getElementById('clearAllBtn').addEventListener('click',clearAll);
render();
</script>
</body>
</html>
